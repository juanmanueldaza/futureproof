name: Apt Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-apt:
    uses: ./.github/workflows/build-apt.yml
    with:
      validate: true
      validation_images: "ubuntu:24.04 debian:12"

  sign-and-publish:
    needs: build-apt
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            gnupg \
            jq \
            curl \
            xz-utils \
            zstd \
            unzip

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          path: dist/deb
          pattern: deb-package-*
          merge-multiple: true

      - name: Build apt repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          deb_path="$(ls -1t dist/deb/*.deb | head -n1)"
          scripts/build_apt_repo.sh "${deb_path}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/apt

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
