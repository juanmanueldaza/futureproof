name: Apt Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-apt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            gnupg \
            jq \
            curl \
            xz-utils \
            zstd \
            unzip

      - name: Build deb package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIP_DEFAULT_TIMEOUT: "120"
          PIP_RETRIES: "5"
          PIP_NO_BUILD_ISOLATION: "1"
        run: scripts/build_deb.sh

      - name: Validate apt install flow
        env:
          APT_VALIDATION_IMAGES: "ubuntu:24.04 debian:12"
        run: |
          deb_path="$(ls -1t dist/deb/*.deb | head -n1)"
          scripts/validate_apt_artifact.sh "${deb_path}"

      - name: Build apt repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          deb_path="$(ls -1t dist/deb/*.deb | head -n1)"
          scripts/build_apt_repo.sh "${deb_path}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/apt

  deploy-pages:
    needs: build-apt
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
