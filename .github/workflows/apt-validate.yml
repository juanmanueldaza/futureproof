name: Apt Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-apt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            gnupg \
            jq \
            curl \
            xz-utils \
            zstd \
            unzip

      - name: Build deb package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIP_DEFAULT_TIMEOUT: "120"
          PIP_RETRIES: "5"
          PIP_NO_BUILD_ISOLATION: "1"
        run: scripts/build_deb.sh

      - name: Validate apt install flow
        env:
          APT_VALIDATION_IMAGES: "ubuntu:24.04 debian:12"
        run: |
          deb_path="$(ls -1t dist/deb/*.deb | head -n1)"
          scripts/validate_apt_artifact.sh "${deb_path}"
