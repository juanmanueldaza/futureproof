name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[all-providers]"
          pip install pyright pytest ruff

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright src/futureproof

      - name: Test
        run: pytest tests/ -q --ignore=tests/eval/
